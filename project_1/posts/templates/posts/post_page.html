{% extends "layout.html" %}

{% block title %}
    {{post.tile}}
{% endblock title %}

{% block content %}
    <section>
    <img 
            class="banner" 
            src="{{ post.banner.url }}" 
            alt="{{ post.title }}"
        />
    <h1>{{ post.title }}</h2>
    <p>{{ post.date }}</P>
    <p>{{ post.body }}</P>                  
    </section>
{% endblock content %}
